volumes:
  n8n_storage:
  postgres_storage:
  qdrant_storage:
  open-webui:
  flowise:

networks:
  demo:
    name: local-ai-packaged_demo
    external: true

x-n8n: &service-n8n
  build:
    context: .
    dockerfile: Dockerfile.n8n
  networks: ['demo']
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_USER=${POSTGRES_USER}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    - NODE_PATH=/home/node/node_modules:/usr/local/lib/node_modules
    - PATH=/opt/n8n-python-venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    - VIRTUAL_ENV=/opt/n8n-python-venv
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_PERSONALIZATION_ENABLED=false
    - N8N_ENCRYPTION_KEY
    - N8N_USER_MANAGEMENT_JWT_SECRET
    - N8N_SECURE_COOKIE=false
  links:
    - postgres

services:
  flowise:
    image: flowiseai/flowise
    networks: ['demo']
    restart: unless-stopped
    container_name: flowise
    environment:
      - PORT=3001
    ports:
      - 3001:3001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ~/.flowise:/root/.flowise
    entrypoint: /bin/sh -c "sleep 3; flowise start"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    networks: ['demo']
    restart: unless-stopped
    container_name: open-webui
    ports:
      - "3000:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open-webui:/app/backend/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

  postgres:
    image: postgres:16-alpine
    networks: ['demo']
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m

  n8n-import:
    <<: *service-n8n
    container_name: n8n-import
    entrypoint: /bin/sh
    command:
      - "-c"
      - "n8n import:credentials --separate --input=/backup/credentials && n8n import:workflow --separate --input=/backup/workflows"
    volumes:
      - ./n8n/backup:/backup
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

  n8n:
    <<: *service-n8n
    container_name: n8n
    restart: unless-stopped
    entrypoint: /bin/sh
    command:
      - "-c"
      - "export PATH=/opt/n8n-python-venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin VIRTUAL_ENV=/opt/n8n-python-venv && exec tini -- /docker-entrypoint.sh"
    ports:
      - 127.0.0.1:5678:5678
    environment:
      - N8N_HOST=ks-media.heyremi.de
      - N8N_PROTOCOL=https
      - N8N_PORT=5678
      - WEBHOOK_URL=https://ks-media.heyremi.de/
      - N8N_PROXY_HOPS=1
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN:-change-me-runner-token}
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_ENABLED_TASK_TYPES=javascript,python
      - N8N_NATIVE_PYTHON_RUNNER=true
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_RUNNERS_STDLIB_ALLOW=os,pathlib,json,math,datetime,re
      - N8N_RUNNERS_EXTERNAL_ALLOW=youtube_transcript_api
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - NODE_PATH=/home/node/node_modules:/usr/local/lib/node_modules
      - PATH=/opt/n8n-python-venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - VIRTUAL_ENV=/opt/n8n-python-venv
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_ENCRYPTION_KEY
      - N8N_USER_MANAGEMENT_JWT_SECRET
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_storage:/home/node/.n8n

    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g

  n8n-runners:
    build:
      context: .
      dockerfile: Dockerfile.n8n-runners
    container_name: n8n-runners
    restart: unless-stopped
    networks: ['demo']
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN:-change-me-runner-token}
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
      - N8N_RUNNERS_CONFIG_PATH=/etc/n8n-task-runners.json
      - N8N_RUNNERS_ENABLED_TASK_TYPES=javascript,python
      - N8N_RUNNERS_MAX_CONCURRENCY=5
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_RUNNERS_STDLIB_ALLOW=os,pathlib,json,math,datetime,re
      - N8N_RUNNERS_EXTERNAL_ALLOW=youtube_transcript_api
      - PYTHONPATH=/opt/runners/task-runner-python
      - YTA_PROXY_HTTP_URL=${YTA_PROXY_HTTP_URL:-}
      - YTA_PROXY_HTTPS_URL=${YTA_PROXY_HTTPS_URL:-}
      - YTA_PROXY_USERNAME=${YTA_PROXY_USERNAME:-}
      - YTA_PROXY_PASSWORD=${YTA_PROXY_PASSWORD:-}
    depends_on:
      n8n:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    networks: ['demo']
    restart: unless-stopped
    ports:
      - 6333:6333
      - 6334:6334
    volumes:
      - qdrant_storage:/qdrant/storage
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

  custom-api:
    build:
      context: ../custom-api
      dockerfile: Dockerfile
    container_name: custom-api
    networks:
      - demo
    ports:
      - "5001:5001"
    volumes:
      - ../custom-api:/app
    restart: unless-stopped
    environment:
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      - postgres
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
